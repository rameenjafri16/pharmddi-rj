project:
  name: ddi_cot_rj_dataset_a
  seed: 42
  output_dir: /scratch/rjafri/CoT_DDI/outputs/rj_dataset_a

data:
  xml_path: data/raw/drugbank_full.xml
  ddinter_dir: data/raw/ddinter
  processed_dir: /scratch/rjafri/rj_subset_exp1/data/processed/dataset_A
  retrieval_file: /scratch/rjafri/rj_subset_exp1/data/processed/dataset_A/retrieved_examples_train_pathway.json
  use_rj_prompts: true
  ablation_use_pkpd_flag: false
  ablation_use_severity_classifier: true
  ablation_use_no_pathway_note: true
  ablation_use_prodrug_warning: false
  min_pairs_per_class: 130
  n_classes: 129

teacher:
  model_name: meta-llama/Llama-3.3-70B-Instruct
  tensor_parallel_size: 4
  dtype: float16
  max_model_len: 8192
  max_new_tokens: 1536
  temperature: 0.6
  top_p: 0.95
  batch_size: 64
  gpu_memory_utilization: 0.92
  save_every_n_batches: 50

retrieval:
  fingerprint_bits: 2048
  fingerprint_radius: 2
  top_k: 5
  min_diverse_classes: 2

grounded_eval:
  precision_weight: 0.7
  low_score_percentile: 15
  discard_threshold: 0.3
