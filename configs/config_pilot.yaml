# config_pilot.yaml
# Rameen Jafri — April 2026
#
# Configuration for the subset pilot experiment.
# Compares Tanimoto vs pathway retrieval on 4000 stratified pairs.
# Teacher: Llama-3.3-70B-Instruct
# Output: outputs/rj_subset_exp1/

project:
  name: rj_subset_pilot
  seed: 42
  output_dir: /scratch/rjafri/rj_subset_exp1/outputs/rj_subset_exp1

data:
  xml_path: data/raw/drugbank_full.xml
  ddinter_dir: data/raw/ddinter
  processed_dir: data/processed/dataset_A
  train_ratio: 0.8
  min_pairs_per_class: 130
  max_train_per_class: 5000
  n_classes: 129

teacher:
  model_name: meta-llama/Llama-3.3-70B-Instruct
  tensor_parallel_size: 4
  dtype: float16
  max_model_len: 8192
  max_new_tokens: 1536
  temperature: 0.6
  top_p: 0.95
  batch_size: 32
  gpu_memory_utilization: 0.92
  save_every_n_batches: 25

retrieval:
  fingerprint_bits: 2048
  fingerprint_radius: 2
  top_k: 5
  min_diverse_classes: 2

grounded_eval:
  precision_weight: 0.7
  low_score_percentile: 15
  discard_threshold: 0.3
